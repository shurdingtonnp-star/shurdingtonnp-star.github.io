<style>
body { margin:0; font-family:Arial; background:#0f172a; color:#e2e8f0; }
header { text-align:center; padding:25px; font-size:2rem; font-weight:bold; }
h2 { text-align:center; margin-top:30px; }
.controls { max-width:900px; margin:auto; padding:10px 20px; }
input { width:100%; padding:10px; border-radius:8px; border:none; }
.filters { text-align:center; margin-top:10px; }
button { margin:5px; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
.container { max-width:900px; margin:auto; padding:20px; display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; }
.card { background:#1e293b; border-radius:12px; padding:15px; text-align:center; transition:0.2s; }
.card:hover { background:#334155; transform:translateY(-3px); }
.thumb { width:100%; border-radius:8px; }
.icon { font-size:2rem; margin-bottom:10px; }
a { color:#38bdf8; text-decoration:none; font-weight:bold; }
.tag { display:inline-block; margin:3px; padding:3px 8px; background:#334155; border-radius:6px; font-size:0.75rem; }
</style>
</head>

const videoContainer = document.getElementById('videoContainer');
const appSections = document.getElementById('appSections');
const searchInput = document.getElementById('search');

let videoData = [];

function setFilter(f) {
    currentFilter = f;
    render();
}

async function loadVideos() {
    for (let id of videoIds) {
        let title = id;
        try {
            const res = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${id}&format=json`);
            const data = await res.json();
            title = data.title;
        } catch {}
        videoData.push({ id, title, url:`https://youtube.com/watch?v=${id}`, thumb:`https://img.youtube.com/vi/${id}/hqdefault.jpg` });
    }
    render();
}

function render() {
    const term = searchInput.value.toLowerCase();

    videoContainer.innerHTML = '';
    appSections.innerHTML = '';

    // videos
    videoData
    .filter(v => v.title.toLowerCase().includes(term))
    .forEach(v => {
        const el = document.createElement('div');
        el.className = 'card';
        el.innerHTML = `<img class="thumb" src="${v.thumb}"><p>${v.title}</p><a href="${v.url}" target="_blank">Watch</a>`;
        videoContainer.appendChild(el);
    });

    // group apps
    const grouped = {};

    apps
    .filter(a => currentFilter === 'ALL' || a.tags.includes(currentFilter))
    .filter(a => a.title.toLowerCase().includes(term) || a.tags.join(' ').toLowerCase().includes(term))
    .forEach(a => {
        if (!grouped[a.group]) grouped[a.group] = [];
        grouped[a.group].push(a);
    });

    for (let group in grouped) {
        const section = document.createElement('div');
        section.innerHTML = `<h2>${group}</h2><div class="container"></div>`;
        const container = section.querySelector('.container');

        grouped[group].forEach(a => {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <div class="icon">${a.icon}</div>
                <p>${a.title}</p>
                <a href="${a.url}" target="_blank">Open</a>
                <div>${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            `;
            container.appendChild(el);
        });

        appSections.appendChild(section);
    }
}

searchInput.addEventListener('input', render);

loadVideos();
</script>
</body>
